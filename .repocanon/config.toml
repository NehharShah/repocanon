# RepoCanon project configuration. Safe to edit by hand.
# Generated by `repocanon init` and tuned for this repo.

[project]
name = "repocanon"

[scan]
include = []
exclude = [
  "tests/fixtures/**",
  "docs/samples/**",
  "dist/**",
  "build/**",
  ".venv/**",
]

[generate]
targets = ["agents", "claude", "copilot", "cursor"]
safe_overwrite = true
